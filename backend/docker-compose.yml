version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: omsdemo
      POSTGRES_DB: database_project
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:omsdemo@db:5432/database_project
      JWT_SECRET: your_jwt_secret
      PORT: 3000
    depends_on:
      - db
    command: sh -c "for f in scripts/*.ts; do npx ts-node \"$f\"; done && npx ts-node src/server.ts"
volumes:
  postgres_data:
